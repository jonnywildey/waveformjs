<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="favicon.ico" />
        <title>Alphabets Heaven — Eternal Infraviolet Sunset EP</title>
        <link href="style/navbar.css" rel="stylesheet" />
        <link href="style/alphabets.css" rel="stylesheet" />
        <link href="style/waveformjs.css" rel="stylesheet" />

        <!-- =====================================================================
             Album palette + config — swap these two blocks per release
             ===================================================================== -->
        <style>
            :root {
                --panel-rgb: 45, 15, 60; /* deep violet */
                --accent: #c85a8a; /* rose pink */
                --accent-rgb: 200, 90, 138; /* same as above as R,G,B */
                --bg-overlay: rgba(15, 5, 25, 0.96);
            }
            /* URL resolved relative to this HTML file — no ambiguity */
            .content-container {
                background:
                    linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                    url("images/eternal-infraviolet/eternal-infravioletback.jpg")
                        no-repeat center / cover;
                background-attachment: fixed;
            }
        </style>

        <script>
            window.albumConfig = {
                artist: "Alphabets Heaven",
                title: "Eternal Infraviolet Sunset EP",
                year: 2025,
                label: "WotNot Music",
                credits: ["Mixed and Mastered by Aneek Thapar"],
                artwork: "images/eternal-infraviolet/eternal-infraviolet.jpg",
                links: [
                    {
                        name: "Bandcamp",
                        url: "https://alphabetsheaven.bandcamp.com/",
                    },
                    {
                        name: "Apple Music",
                        url: "https://music.apple.com/gb/artist/alphabets-heaven/399956656",
                    },
                    {
                        name: "Spotify",
                        url: "https://open.spotify.com/artist/6hGEHoOjXVNXSP0xicAtxy",
                    },
                    {
                        name: "Tidal",
                        url: "https://tidal.com/browse/artist/3857031",
                    },
                ],
                tracks: [
                    {
                        id: "eva",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Eternal Infraviolet Sunset EP/01 - Alphabets Heaven - Eva.mp3",
                        svgId: "eternal-infraviolet/eva.mp3",
                        title: "Eva",
                    },
                    {
                        id: "dream-world",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Eternal Infraviolet Sunset EP/02 - Alphabets Heaven - Dream World.mp3",
                        svgId: "eternal-infraviolet/dream-world.mp3",
                        title: "Dream World",
                    },
                    {
                        id: "sake-of-itself",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Eternal Infraviolet Sunset EP/03 - Alphabets Heaven - Sake Of Itself.mp3",
                        svgId: "eternal-infraviolet/sake-of-itself.mp3",
                        title: "Sake Of Itself",
                        artwork:
                            "images/eternal-infraviolet/sake-of-itself.jpg",
                    },
                    {
                        id: "eternal-infraviolet-sunset",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Eternal Infraviolet Sunset EP/04 - Alphabets Heaven - Eternal Infraviolet Sunset.mp3",
                        svgId: "eternal-infraviolet/eternal-infraviolet-sunset.mp3",
                        title: "Eternal Infraviolet Sunset",
                    },
                    {
                        id: "sinta",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Eternal Infraviolet Sunset EP/05 - Alphabets Heaven - Sinta.mp3",
                        svgId: "eternal-infraviolet/sinta.mp3",
                        title: "Sinta",
                        artwork: "images/eternal-infraviolet/sinta.jpg",
                    },
                ],
            };
        </script>
    </head>

    <body>
        <div class="content-container">
            <nav class="navbar navbar-static-top">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav">
                        <li><a href="index.html">Alphabets Heaven</a></li>
                        <li><a href="video.html">Video</a></li>
                    </ul>
                    <div class="nav-social">
                        <a
                            href="http://www.soundcloud.com/alphabetsheaven"
                            target="_blank"
                            rel="noopener"
                            ><img src="images/social/sc2.png" alt="SoundCloud"
                        /></a>
                        <a
                            href="https://alphabetsheaven.bandcamp.com/"
                            target="_blank"
                            rel="noopener"
                            ><img
                                src="images/social/bandcamp.png"
                                alt="Bandcamp"
                        /></a>
                    </div>
                </div>
            </nav>

            <div class="page-layout">
                <!-- Artwork + streaming links -->
                <div class="artwork-column">
                    <img
                        class="album-artwork"
                        id="album-artwork"
                        src=""
                        alt=""
                    />
                    <div class="artwork-links" id="artwork-links">
                        <!-- populated by player.js -->
                    </div>
                    <div class="album-credits" id="release-credits"></div>
                    <details class="fx-section">
                        <summary>FX</summary>
                        <div class="fx-controls-wrap">
                            <div class="fx-controls">
                                <label for="volume">Volume</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="volume"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="filter">Filter</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="filter"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="delay-send">Delay</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-send"
                                    step="0.01"
                                    value="0"
                                />
                                <label for="delay-time">Delay Time</label>
                                <input
                                    type="range"
                                    min="0.1"
                                    max="1.2"
                                    id="delay-time"
                                    step="0.01"
                                    value="0.35"
                                />
                                <label for="delay-feedback">Feedback</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-feedback"
                                    step="0.01"
                                    value="0.4"
                                />
                            </div>
                        </div>
                    </details>
                </div>

                <!-- Player: header card → circle → title -->
                <div class="player-column">
                    <div class="player-header" id="player-header"></div>
                    <div class="player-backdrop">
                        <img
                            class="vinyl-label"
                            id="vinyl-label"
                            src=""
                            alt=""
                        />
                        <div class="track-player" id="long"></div>
                    </div>
                    <div class="track-below">
                        <h3 class="track-title"></h3>
                        <div class="track-time" id="track-time"></div>
                    </div>
                </div>

                <!-- Track list -->
                <aside class="track-list" id="track-list">
                    <!-- populated by player.js from albumConfig -->
                </aside>
            </div>

            <div class="artwork-lightbox" id="artwork-lightbox" hidden>
                <img
                    class="artwork-lightbox-img"
                    id="artwork-lightbox-img"
                    src=""
                    alt=""
                />
            </div>
        </div>

        <script src="player.js"></script>
    </body>
</html>
