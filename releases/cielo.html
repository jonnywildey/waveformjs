<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="favicon.ico" />
        <title>Alphabets Heaven — Cielo</title>
        <link href="style/navbar.css" rel="stylesheet" />
        <link href="style/alphabets.css" rel="stylesheet" />
        <link href="style/waveformjs.css" rel="stylesheet" />

        <style>
            :root {
                --panel-rgb: 18, 12, 30;
                --accent: #b07cd8;
                --accent-rgb: 176, 124, 216;
                --bg-overlay: rgba(8, 4, 16, 0.9);
            }
            .content-container {
                background:
                    linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                    url("images/cielo/cieloback.jpg") no-repeat center / cover;
                background-attachment: fixed;
            }
        </style>

        <script>
            window.albumConfig = {
                artist: "Alphabets Heaven",
                title: "Cielo",
                year: 2020,
                label: "WotNot Music",
                credits: [],
                artwork: "images/cielo/cielo.jpg",
                links: [
                    {
                        name: "Bandcamp",
                        url: "https://alphabetsheaven.bandcamp.com/album/cielo-2",
                    },
                ],
                tracks: [
                    {
                        id: "cielo",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Cielo/Jonny Wildey - Cielo.mp3",
                        svgId: "cielo/cielo.mp3",
                        title: "Cielo",
                    },
                    {
                        id: "hulu-rave",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Cielo/Jonny Wildey - Hulu Rave.mp3",
                        svgId: "cielo/hulu-rave.mp3",
                        title: "Hulu Rave",
                    },
                    {
                        id: "somers-acid",
                        url: "https://pub-b2c73c4391b6462980c9e5d8c74b3b8f.r2.dev/audio/Alphabets Heaven - Cielo/Jonny Wildey - Somers Acid.mp3",
                        svgId: "cielo/somers-acid.mp3",
                        title: "Somers Acid",
                    },
                ],
            };
        </script>
    </head>

    <body>
        <div class="content-container">
            <nav class="navbar navbar-static-top">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav">
                        <li><a href="index.html">Alphabets Heaven</a></li>
                    </ul>
                    <div class="nav-social">
                        <a
                            href="http://www.soundcloud.com/alphabetsheaven"
                            target="_blank"
                            rel="noopener"
                            ><img src="images/social/sc2.png" alt="SoundCloud"
                        /></a>
                        <a
                            href="https://alphabetsheaven.bandcamp.com/"
                            target="_blank"
                            rel="noopener"
                            ><img
                                src="images/social/bandcamp.png"
                                alt="Bandcamp"
                        /></a>
                    </div>
                </div>
            </nav>

            <div class="page-layout">
                <div class="artwork-column">
                    <img
                        class="album-artwork"
                        id="album-artwork"
                        src=""
                        alt=""
                    />
                    <div class="artwork-links" id="artwork-links"></div>
                    <div class="album-credits" id="release-credits"></div>
                    <details class="fx-section">
                        <summary>FX</summary>
                        <div class="fx-controls-wrap">
                            <div class="fx-controls">
                                <label for="volume">Volume</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="volume"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="filter">Filter</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="filter"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="delay-send">Delay</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-send"
                                    step="0.01"
                                    value="0"
                                />
                                <label for="delay-time">Delay Time</label>
                                <input
                                    type="range"
                                    min="0.1"
                                    max="1.2"
                                    id="delay-time"
                                    step="0.01"
                                    value="0.35"
                                />
                                <label for="delay-feedback">Feedback</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-feedback"
                                    step="0.01"
                                    value="0.4"
                                />
                            </div>
                        </div>
                    </details>
                </div>

                <div class="player-column">
                    <div class="player-header" id="player-header"></div>
                    <div class="player-backdrop">
                        <img
                            class="vinyl-label"
                            id="vinyl-label"
                            src=""
                            alt=""
                        />
                        <div class="track-player" id="long"></div>
                    </div>
                    <div class="track-below">
                        <h3 class="track-title"></h3>
                        <div class="track-time" id="track-time"></div>
                    </div>
                </div>

                <aside class="track-list" id="track-list"></aside>
            </div>

            <div class="artwork-lightbox" id="artwork-lightbox" hidden>
                <img
                    class="artwork-lightbox-img"
                    id="artwork-lightbox-img"
                    src=""
                    alt=""
                />
            </div>
        </div>

        <script src="player.js"></script>
    </body>
</html>
