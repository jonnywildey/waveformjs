    <body>
        <div class="content-container">
            <nav class="navbar navbar-static-top">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav">
                        <li><a href="index.html">Alphabets Heaven</a></li>
                    </ul>
                    <div class="nav-social">
                        <a
                            href="http://www.soundcloud.com/alphabetsheaven"
                            target="_blank"
                            rel="noopener"
                            ><img src="images/social/sc2.png" alt="SoundCloud"
                        /></a>
                        <a
                            href="https://alphabetsheaven.bandcamp.com/"
                            target="_blank"
                            rel="noopener"
                            ><img
                                src="images/social/bandcamp.png"
                                alt="Bandcamp"
                        /></a>
                    </div>
                </div>
            </nav>

            <div class="page-layout">
                <div class="artwork-column">
                    <img
                        class="album-artwork"
                        id="album-artwork"
                        src=""
                        alt=""
                    />
                    <div class="artwork-links" id="artwork-links"></div>
                    <div class="album-credits" id="release-credits"></div>
                    <details class="fx-section">
                        <summary>FX</summary>
                        <div class="fx-controls-wrap">
                            <div class="fx-controls">
                                <label for="volume">Volume</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="volume"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="filter">Filter</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="filter"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="delay-send">Delay</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-send"
                                    step="0.01"
                                    value="0"
                                />
                                <label for="delay-time">Delay Time</label>
                                <input
                                    type="range"
                                    min="0.1"
                                    max="1.2"
                                    id="delay-time"
                                    step="0.01"
                                    value="0.35"
                                />
                                <label for="delay-feedback">Feedback</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-feedback"
                                    step="0.01"
                                    value="0.4"
                                />
                            </div>
                        </div>
                    </details>
                </div>

                <div class="player-column">
                    <div class="player-header" id="player-header"></div>
                    <div class="player-backdrop">
                        <img
                            class="vinyl-label"
                            id="vinyl-label"
                            src=""
                            alt=""
                        />
                        <div class="track-player" id="long"></div>
                    </div>
                    <div class="track-below">
                        <h3 class="track-title"></h3>
                        <div class="track-time" id="track-time"></div>
                    </div>
                </div>

                <aside class="track-list" id="track-list"></aside>
            </div>

            <div class="artwork-lightbox" id="artwork-lightbox" hidden>
                <img
                    class="artwork-lightbox-img"
                    id="artwork-lightbox-img"
                    src=""
                    alt=""
                />
            </div>
        </div>

        <script src="player.js"></script>
    </body>
</html>
