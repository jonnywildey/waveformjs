<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="favicon.ico" />
        <title>Alphabets Heaven — Your Lifestyle</title>
        <link href="style/navbar.css" rel="stylesheet" />
        <link href="style/alphabets.css" rel="stylesheet" />
        <link href="style/waveformjs.css" rel="stylesheet" />

        <style>
            :root {
                --panel-rgb: 28, 18, 8;
                --accent: #c8963a;
                --accent-rgb: 200, 150, 58;
                --bg-overlay: rgba(12, 6, 0, 0.9);
            }
            .content-container {
                background:
                    linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                    url("images/your-lifestyle/your-lifestyleback.jpg")
                        no-repeat center / cover;
                background-attachment: fixed;
            }
        </style>

        <!-- TODO: after running generate-batch.js, fill in tracks[].url and tracks[].svgId -->
        <script>
            window.albumConfig = {
                artist: "Alphabets Heaven",
                title: "Your Lifestyle",
                year: 2018,
                label: "WotNot",
                credits: [],
                artwork: "images/your-lifestyle/your-lifestyle.jpg",
                links: [
                    {
                        name: "Bandcamp",
                        url: "https://alphabetsheaven.bandcamp.com/album/your-lifestyle",
                    },
                ],
                tracks: [
                    { id: "nylon", url: "", svgId: "", title: "Nylon" },
                    { id: "dancing-again", url: "", svgId: "", title: "Dancing Again" },
                    { id: "laces", url: "", svgId: "", title: "Laces" },
                    { id: "shoulders", url: "", svgId: "", title: "Shoulders" },
                    { id: "lord-knows", url: "", svgId: "", title: "Lord Knows" },
                    { id: "87", url: "", svgId: "", title: "87" },
                    { id: "pencil-loop", url: "", svgId: "", title: "Pencil Loop" },
                    { id: "kieron", url: "", svgId: "", title: "Kieron" },
                    { id: "follow", url: "", svgId: "", title: "Follow" },
                    { id: "no-fools", url: "", svgId: "", title: "No Fools" },
                    { id: "mce", url: "", svgId: "", title: "MCE" },
                    { id: "tote-bag", url: "", svgId: "", title: "Tote Bag" },
                    { id: "teachers", url: "", svgId: "", title: "Teachers" },
                    { id: "piano-vibes", url: "", svgId: "", title: "Piano Vibes" },
                    { id: "hi", url: "", svgId: "", title: "Hi" },
                    { id: "kodak", url: "", svgId: "", title: "Kodak" },
                    { id: "toast", url: "", svgId: "", title: "Toast" },
                    { id: "your-lifestyle", url: "", svgId: "", title: "Your Lifestyle" },
                    { id: "in-silence", url: "", svgId: "", title: "In Silence" },
                    { id: "your-lifestyle-mix", url: "", svgId: "", title: "Your Lifestyle (Full Continuous Mix)" },
                ],
            };
        </script>
    </head>

    <body>
        <div class="content-container">
            <nav class="navbar navbar-static-top">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav">
                        <li><a href="index.html">Alphabets Heaven</a></li>
                    </ul>
                    <div class="nav-social">
                        <a
                            href="http://www.soundcloud.com/alphabetsheaven"
                            target="_blank"
                            rel="noopener"
                            ><img src="images/social/sc2.png" alt="SoundCloud"
                        /></a>
                        <a
                            href="https://alphabetsheaven.bandcamp.com/"
                            target="_blank"
                            rel="noopener"
                            ><img
                                src="images/social/bandcamp.png"
                                alt="Bandcamp"
                        /></a>
                    </div>
                </div>
            </nav>

            <div class="page-layout">
                <div class="artwork-column">
                    <img
                        class="album-artwork"
                        id="album-artwork"
                        src=""
                        alt=""
                    />
                    <div class="artwork-links" id="artwork-links"></div>
                    <div class="album-credits" id="release-credits"></div>
                    <details class="fx-section">
                        <summary>FX</summary>
                        <div class="fx-controls-wrap">
                            <div class="fx-controls">
                                <label for="volume">Volume</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="volume"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="filter">Filter</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="filter"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="delay-send">Delay</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-send"
                                    step="0.01"
                                    value="0"
                                />
                                <label for="delay-time">Delay Time</label>
                                <input
                                    type="range"
                                    min="0.1"
                                    max="1.2"
                                    id="delay-time"
                                    step="0.01"
                                    value="0.35"
                                />
                                <label for="delay-feedback">Feedback</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-feedback"
                                    step="0.01"
                                    value="0.4"
                                />
                            </div>
                        </div>
                    </details>
                </div>

                <div class="player-column">
                    <div class="player-header" id="player-header"></div>
                    <div class="player-backdrop">
                        <img
                            class="vinyl-label"
                            id="vinyl-label"
                            src=""
                            alt=""
                        />
                        <div class="track-player" id="long"></div>
                    </div>
                    <div class="track-below">
                        <h3 class="track-title"></h3>
                        <div class="track-time" id="track-time"></div>
                    </div>
                </div>

                <aside class="track-list" id="track-list"></aside>
            </div>

            <div class="artwork-lightbox" id="artwork-lightbox" hidden>
                <img
                    class="artwork-lightbox-img"
                    id="artwork-lightbox-img"
                    src=""
                    alt=""
                />
            </div>
        </div>

        <script src="player.js"></script>
    </body>
</html>
