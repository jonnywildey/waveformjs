                    <details class="fx-section">
                        <summary>FX</summary>
                        <div class="fx-controls-wrap">
                            <div class="fx-controls">
                                <label for="volume">Volume</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="volume"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="filter">Filter</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="1"
                                    id="filter"
                                    step="0.01"
                                    value="1"
                                />
                                <label for="delay-send">Delay</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-send"
                                    step="0.01"
                                    value="0"
                                />
                                <label for="delay-time">Delay Time</label>
                                <input
                                    type="range"
                                    min="0.1"
                                    max="1.2"
                                    id="delay-time"
                                    step="0.01"
                                    value="0.35"
                                />
                                <label for="delay-feedback">Feedback</label>

                                    type="range"
                                    min="0"
                                    max="0.7"
                                    id="delay-feedback"
                                    step="0.01"
                                    value="0.4"
