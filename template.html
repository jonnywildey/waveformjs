<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="favicon.ico" />
        <title>Alphabets Heaven — ALBUM TITLE</title>
        <link href="style/bootstrap.css" rel="stylesheet" />
        <link href="style/alphabets.css" rel="stylesheet" />
        <link href="style/waveformjs.css" rel="stylesheet" />

        <!-- =====================================================================
             STEP 1 — Palette
             Pick colours that suit the release artwork. See README.md for guidance.
             ===================================================================== -->
        <style>
            :root {
                --panel-rgb:  11, 37, 64;         /* R,G,B of dark frosted panels  */
                --accent:     #eb4116;             /* play button, active track     */
                --accent-rgb: 235, 65, 22;         /* same colour as R,G,B          */
                --bg-overlay: rgba(0, 0, 0, 0.80); /* overlay on background image   */
            }
            /* URL is resolved relative to THIS file — keep the rule here, not in alphabets.css */
            .content-container {
                background:
                    linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                    url("images/SLUG.jpg") no-repeat center / cover;
                background-attachment: fixed;
            }
        </style>

        <!-- =====================================================================
             STEP 2 — albumConfig
             - svgId must match generate-batch.js output: "SLUG/track-name.mp3"
             - tracks[].artwork is optional; omit if no track-specific background
             ===================================================================== -->
        <script>
            window.albumConfig = {
                artist:  "Alphabets Heaven",
                title:   "ALBUM TITLE",
                artwork: "images/SLUG.jpg",
                links: [
                    { name: "Bandcamp",    url: "https://alphabetsheaven.bandcamp.com/" },
                    { name: "Apple Music", url: "https://music.apple.com/gb/artist/alphabets-heaven/399956656" },
                    { name: "Spotify",     url: "https://open.spotify.com/artist/6hGEHoOjXVNXSP0xicAtxy" },
                    { name: "Tidal",       url: "https://tidal.com/browse/artist/3857031" },
                ],
                tracks: [
                    // Repeat this block for each track.
                    // Run: node generate-batch.js "audio/Alphabets Heaven - ALBUM" SLUG
                    // to generate svg/ and json/ assets, then fill in the fields below.
                    {
                        id:    "track-one",
                        url:   "audio/Alphabets Heaven - ALBUM/01 - Alphabets Heaven - Track One.mp3",
                        svgId: "SLUG/track-one.mp3",
                        title: "Track One",
                        // artwork: "audio/Alphabets Heaven - ALBUM/track-one@0.5x.jpg",
                    },
                ],
            };
        </script>
    </head>

    <body>
        <div class="content-container">
            <nav class="navbar navbar-static-top">
                <div class="navbar-header">
                    <button
                        type="button"
                        class="navbar-toggle collapsed"
                        data-toggle="collapse"
                        data-target="#navbar"
                    >
                        <span class="sr-only">Toggle navigation</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                </div>
                <div id="navbar" class="navbar-collapse collapse">
                    <ul class="nav navbar-nav">
                        <li><a href="index.html">Releases</a></li>
                        <li><a href="video.html">Video</a></li>
                    </ul>
                </div>
            </nav>

            <div class="page-layout">
                <!-- Artwork + streaming links -->
                <div class="artwork-column">
                    <img class="album-artwork" id="album-artwork" src="" alt="" />
                    <div class="artwork-links" id="artwork-links"></div>
                </div>

                <!-- Player: header → circle disc → title + FX -->
                <div class="player-column">
                    <div class="player-header" id="player-header"></div>
                    <div class="player-backdrop">
                        <img class="vinyl-label" id="vinyl-label" src="" alt="" />
                        <div class="track-player" id="long"></div>
                    </div>
                    <div class="track-below">
                        <h3 class="track-title"></h3>
                        <details class="fx-section">
                            <summary>FX</summary>
                            <div class="fx-controls">
                                <label for="volume">Volume</label>
                                <input type="range" min="0" max="1" id="volume" step="0.01" value="1" />
                                <label for="filter">Filter</label>
                                <input type="range" min="0" max="1" id="filter" step="0.01" value="1" />
                                <label for="delay-send">Delay Send</label>
                                <input type="range" min="0" max="0.7" id="delay-send" step="0.01" value="0" />
                                <label for="delay-time">Delay Time</label>
                                <input type="range" min="0.1" max="1.2" id="delay-time" step="0.01" value="0.35" />
                                <label for="delay-feedback">Feedback</label>
                                <input type="range" min="0" max="0.7" id="delay-feedback" step="0.01" value="0.4" />
                            </div>
                        </details>
                    </div>
                </div>

                <!-- Track list -->
                <aside class="track-list" id="track-list"></aside>
            </div>

            <div class="artwork-lightbox" id="artwork-lightbox" hidden>
                <img class="artwork-lightbox-img" id="artwork-lightbox-img" src="" alt="" />
            </div>

            <div class="footer-row">
                <div class="artwork"></div>
                <div class="item-link">
                    <a href="http://www.soundcloud.com/alphabetsheaven">
                        <img src="images/sc2.png" alt="SoundCloud" />
                    </a>
                </div>
                <div class="item-link">
                    <a href="https://alphabetsheaven.bandcamp.com/">
                        <img src="images/bandcamp.png" alt="Bandcamp" />
                    </a>
                </div>
            </div>
        </div>

        <script src="player.js"></script>
    </body>
</html>
